<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            background-color: pink;
        }

    </style>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <form action="" >
        <table border="3" width="50%" align="center" cellpadding="30">
            <tr>
                <th>
                    <label for="fname"> First Name </label>
                </th>
                <td>
                    <input type="text" id="fname" placeholder="Your First Name here" >
                </td>
            </tr>
            <tr>
                <th> <label for=""> Last Name</label></th>
                <td>
                    <input type="text" value="Aditya" >
                </td>
            </tr>
            <tr>
                <th> <label for=""> Email</label> </th>
                <td>
                    <input type="email" >
                </td>
            </tr>
            <tr>
                <th><label for="">Password</label> </th>
                <td>
                    <input type="password">
                </td>
            </tr>
            <!-- Radio button -->
            <tr>
                <th> <label for=""> Gender</label> </th>
                <td>
                    <label for="">Male</label>
                    <input type="radio" value="male" name="g1">
                    
                    <label for=""> Female</label>
                    <input type="radio" value="female" name="g1">
                </td>
            </tr>
            <tr>
                <th> Highest Qualification </th>
                <td>
                    <label for=""> 10th </label>
                    <input type="radio" name="q1">
                    <label for=""> 12th</label>
                    <input type="radio" name="q1">
                    <label for="">BCA</label>
                    <input type="radio" name="q1">
                </td>
            </tr>
            <!-- Checkbox -->
             <tr>
                <th> Skills </th>
                <td>
                    <label for=""> HTML</label>
                    <input type="checkbox" name="">
                    <label for="">CSS</label>
                    <input type="checkbox">
                    <label for="">JS</label>
                    <input type="checkbox">
                </td>
             </tr>
             <!-- Select -->
              <tr>
                <th> <label for=""> City</label> </th>
                <td>
                    <select name="" id="">
                        <option value="" >----- Select City ----- </option>
                        <option value=""> Delhi  </option>
                        <option value=""> Meerut  </option>
                        <option value=""> Noida  </option>
                        <option value=""> Nainital  </option>
                        <option value=""> Rishikesh  </option>
                    </select>
                </td>
              </tr>
              <tr>
                <th> <label for="">DOB</label> </th>
                <td>
                    <input type="date">
                </td>
              </tr>
              <tr>
                <th><label for="">Select Range</label></th>
                <td> <input type="range"> </td>
              </tr>
            <tr>
                <td> <input type="submit"> </td>
                <td> <input type="reset" > </td>
            </tr>
        </table> 
    </form>

    <p style="font-size: 90px;"> Content</p>


</body>

</html>
